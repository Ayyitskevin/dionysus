{% extends "base.html" %}
{% block title %}Log in · Dionysus{% endblock %}
{% block content %}
<section class="auth-page">
  <form class="signup" method="post" action="/login">{{ csrf_input(request) }}
    <h1>Log in</h1>
    {% if next %}<p class="muted">Log in to continue to your workspace.</p>{% endif %}
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <input type="hidden" name="next" value="{{ next }}">
    <label>Email <input name="email" type="email" value="{{ email }}" required></label>
    <label>Password <input name="password" type="password" required></label>
    <button type="submit">Log in</button>
    <a class="small-link" href="/#signup">Create a workspace instead</a>
  </form>
</section>
{% endblock %}
